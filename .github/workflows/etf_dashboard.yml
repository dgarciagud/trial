name: ETF Returns Dashboard

on:
  schedule:
    # 8:00 AM UTC every weekday (Mon-Fri)
    - cron: "0 8 * * 1-5"
  workflow_dispatch:   # allow manual trigger

permissions:
  contents: write

jobs:
  generate-chart:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate ETF returns chart
        run: python etf_returns.py

      - name: Commit and push chart
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/
          git diff --cached --quiet || git commit -m "chore: update ETF returns chart $(date +%Y-%m-%d)"
          git push
